<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BenzConfig</title>

    <!-- Иконки -->
    <link rel="icon" href="icon-256.ico">
    <link rel="apple-touch-icon" href="icon-180.png">

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Стили -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ===================== Splash Screen ===================== -->
<div id="splash-screen">
    <img src="icon-180.png" alt="BenzConfig" class="splash-icon">
    <p class="splash-text">BenzConfig</p>
</div>

<!-- ===================== Заголовок приложения ===================== -->
<div class="app-header">
    <img src="icon-180.png" alt="BenzConfig" class="app-icon">
</div>

<!-- ===================== Летний блок ===================== -->
<div class="block">
    <h3 class="summer-label">Летний</h3>
    <input id="summerDistance" type="number" inputmode="decimal" placeholder="Пробег, км" autocomplete="off">
    <button onclick="calcSummer()">Рассчитать</button>
    <div id="summerResult"></div>
</div>

<!-- ===================== Зимний блок ===================== -->
<div class="block">
    <h3 class="winter-label">Зимний</h3>
    <input id="winterDistance" type="number" inputmode="decimal" placeholder="Пробег, км" autocomplete="off">
    <button onclick="calcWinter()">Рассчитать</button>
    <div id="winterResult"></div>
</div>

<!-- ===================== Пропорции ===================== -->
<div class="block">
    <h3>Настройки пропорций, %</h3>
    <div class="row">
        <input id="inputCityProp" type="number" inputmode="decimal" placeholder="Город 30%" autocomplete="off">
        <input id="inputRoadProp" type="number" inputmode="decimal" placeholder="Трасса 70%" autocomplete="off">
    </div>
</div>

<!-- ===================== Нормы расхода ===================== -->
<div class="block">
    <h3>Нормы расхода, л/100 км</h3>
    <div class="row">
        <input id="inputCityRate" type="number" inputmode="decimal" placeholder="Город" autocomplete="off">
        <input id="inputRoadRate" type="number" inputmode="decimal" placeholder="Трасса" autocomplete="off">
    </div>
</div>

<!-- ===================== О программе ===================== -->
<button id="btnAbout" class="info-button" aria-label="О программе">О программе</button>

<!-- ===================== Скрипты ===================== -->
<script src="app.js"></script>
<script>
    // ===================== Service Worker =====================
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker
                .register('/service-worker.js')
                .then(() => console.log('Service Worker registered'))
                .catch(err => console.log('SW error:', err));
        });
    }

    // ===================== Анимация сплэш-скрина =====================
    window.addEventListener('load', () => {
        const splash = document.getElementById('splash-screen');
        setTimeout(() => {
            splash.style.opacity = 0; // Плавное исчезновение
            splash.style.transform = 'scale(1.1)'; // Лёгкое увеличение
            setTimeout(() => splash.style.display = 'none', 500); // Скрытие после анимации
        }, 1000); // Показываем сплэш 1 секунду
    });
</script>

</body>
</html>
