<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BenzConfig</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" href="icon-180.png">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <!-- Подключение CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>BenzConfig</h2>

<div class="block">
    <h3>Летний</h3>
    <input id="summerDistance" type="number" placeholder="Пробег, км">
    <button onclick="calcSummer()">Рассчитать</button>
    <div id="summerResult"></div>
</div>

<div class="block">
    <h3>Зимний</h3>
    <input id="winterDistance" type="number" placeholder="Пробег, км">
    <button onclick="calcWinter()">Рассчитать</button>
    <div id="winterResult"></div>
</div>

<button id="btnAbout" class="info-button" aria-label="О программе">О программе</button>
    
<script>
document.getElementById('btnAbout').addEventListener('click', function() {

    // Haptic (если поддерживается)
    if (navigator.vibrate) {
        navigator.vibrate(10);
    }
    
    // Создаем полупрозрачный фон модального окна
    const modal = document.createElement('div');
    modal.className = 'modal-background';

    // Контейнер с информацией
    const container = document.createElement('div');
    container.className = 'modal-container';

    // Иконка
    const img = document.createElement('img');
    img.src = 'icon-180.png';
    img.className = 'modal-icon';
    container.appendChild(img);

    // Основной текст
    const text = document.createElement('p');
    text.innerText =
        "BenzConfig Web App\n\n" +
        "Лицензия: GNU GPL v3.0\n" +
        "Материалы: www.flaticon.com\n" +
        "Исходный код: github.com/benzenergy\n" +
        "Автор: В.А. Чекаев";
    text.className = 'modal-text';
    container.appendChild(text);

    // Серый вторичный текст
    const subText = document.createElement('p');
    subText.innerText = "PWA-версия для iOS";
    subText.className = 'modal-subtext';
    container.appendChild(subText);

    // OK
    const closeBtn = document.createElement('button');
    closeBtn.innerText = "OK";
    closeBtn.className = 'modal-close';
    closeBtn.addEventListener('click', () => {
        document.body.removeChild(modal);
    });
    container.appendChild(closeBtn);

    modal.appendChild(container);
    document.body.appendChild(modal);
});
</script>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
            .then(() => console.log('Service Worker registered'))
            .catch(err => console.log('SW error:', err));
    });
}
</script>
</body>
</html>
