<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BenzConfig</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-startup-image" href="splash.png">

    <style>
        body {
            font-family: sans-serif;
            padding: 16px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            font-size: 16px;
        }
        .block {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>BenzConfig</h2>

<div class="block">
    <h3>Летний</h3>
    <input id="summerDistance" type="number" placeholder="Пробег, км">
    <button onclick="calcSummer()">Рассчитать</button>
    <div id="summerResult"></div>
</div>

<div class="block">
    <h3>Зимний</h3>
    <input id="winterDistance" type="number" placeholder="Пробег, км">
    <button onclick="calcWinter()">Рассчитать</button>
    <div id="winterResult"></div>
</div>

<button id="btnAbout" class="info-button" aria-label="О программе">О программе</button>
    
<script>
    
document.getElementById('btnAbout').addEventListener('click', function() {

    // Haptic (если поддерживается)
    if (navigator.vibrate) {
        navigator.vibrate(10);
    }

    // Создаем полупрозрачный фон модального окна
    const modal = document.createElement('div');
    modal.style.position = 'fixed';
    modal.style.top = 0;
    modal.style.left = 0;
    modal.style.width = '100%';
    modal.style.height = '100%';
    modal.style.background = 'rgba(0,0,0,0.5)';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.style.zIndex = 1000;

    // Контейнер с информацией
    const container = document.createElement('div');
    container.style.background = '#fff';
    container.style.padding = '20px';
    container.style.borderRadius = '10px';
    container.style.textAlign = 'center';
    container.style.maxWidth = '300px';
    container.style.boxShadow = '0 4px 10px rgba(0,0,0,0.2)';

    // Иконка
    const img = document.createElement('img');
    img.src = 'icon-180.png';
    img.style.width = '60px';
    img.style.height = '60px';
    img.style.marginBottom = '8px';
    container.appendChild(img);

    // Основной текст
    const text = document.createElement('p');
    text.innerText =
        "BenzConfig Web App\n\n" +
        "Лицензия: GNU GPL v3.0\n" +
        "Материалы: www.flaticon.com\n" +
        "Исходный код: github.com/benzenergy\n" +
        "Автор: В.А. Чекаев";
    text.style.whiteSpace = 'pre-line';
    text.style.fontSize = '14px';
    text.style.lineHeight = '1.4';
    text.style.margin = '0';
    text.style.textAlign = 'center';
    container.appendChild(text);

    // Серый вторичный текст (iOS style)
    const subText = document.createElement('p');
    subText.innerText = "PWA-версия для iOS";
    subText.style.fontSize = '12px';
    subText.style.color = '#8e8e93';
    subText.style.marginTop = '12px';
    subText.style.textAlign = 'center';
    container.appendChild(subText);

    // OK
    const closeBtn = document.createElement('button');
    closeBtn.innerText = "OK";
    closeBtn.style.marginTop = '12px';
    closeBtn.style.padding = '6px 12px';
    closeBtn.addEventListener('click', () => {
        document.body.removeChild(modal);
    });

    container.appendChild(closeBtn);
    modal.appendChild(container);
    document.body.appendChild(modal);
});
    
</script>

<script src="app.js"></script>
</body>
</html>
