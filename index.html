<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BenzConfig</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: sans-serif;
            padding: 16px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            font-size: 16px;
        }
        .block {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>BenzConfig</h2>

<div class="block">
    <h3>Летний</h3>
    <input id="summerDistance" type="number" placeholder="Пробег, км">
    <button onclick="calcSummer()">Рассчитать</button>
    <div id="summerResult"></div>
</div>

<div class="block">
    <h3>Зимний</h3>
    <input id="winterDistance" type="number" placeholder="Пробег, км">
    <button onclick="calcWinter()">Рассчитать</button>
    <div id="winterResult"></div>
</div>

<button id="btnAbout" class="about-button">О программе</button>

<script>
document.getElementById('btnAbout').addEventListener('click', function() {
    // Создаем полупрозрачный фон модального окна
    const modal = document.createElement('div');
    modal.style.position = 'fixed';
    modal.style.top = 0;
    modal.style.left = 0;
    modal.style.width = '100%';
    modal.style.height = '100%';
    modal.style.background = 'rgba(0,0,0,0.5)';
    modal.style.display = 'flex';
    modal.style.alignItems = 'center';
    modal.style.justifyContent = 'center';
    modal.style.zIndex = 1000;

    // Контейнер с информацией
    const container = document.createElement('div');
    container.style.background = '#fff';
    container.style.padding = '20px';
    container.style.borderRadius = '10px';
    container.style.textAlign = 'center';
    container.style.maxWidth = '300px';
    container.style.boxShadow = '0 4px 10px rgba(0,0,0,0.2)';

    // Иконка приложения
    const img = document.createElement('img');
    img.src = 'icon-180.png'; // путь к иконке PWA
    img.style.width = '60px';
    img.style.height = '60px';
    img.style.marginBottom = '8px';
    container.appendChild(img);

    // Текст
    const text = document.createElement('p');
    text.innerText = "BenzConfig Web App\n Лицензия: GNU GPL v3.0\n Автор: В.А. Чекаев\n Материалы: www.flaticon.ru\n Исходный код: github.com/benzenergy";
    text.style.whiteSpace = 'pre-line'; // переносы строк
    text.style.fontSize = '14px';
    container.appendChild(text);

    // Кнопка закрытия
    const closeBtn = document.createElement('button');
    closeBtn.innerText = "OK";
    closeBtn.style.marginTop = '12px';
    closeBtn.style.padding = '6px 12px';
    closeBtn.style.cursor = 'pointer';
    closeBtn.addEventListener('click', function() {
        document.body.removeChild(modal);
    });
    container.appendChild(closeBtn);

    modal.appendChild(container);
    document.body.appendChild(modal);
});
</script>


    
<script src="app.js"></script>
</body>
</html>
